# Here lie dragons!
#
# This action either builds the server or
# builds a paperclip jar to be updated in the body
# of the PR relating to this action.

name: Build ESPSoftware

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Paper
        run: ./gradlew createReobfPaperclipJar --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ESPPaper
          path: |
            paper-server/build/libs/*.jar
            paperclip/build/libs/*.jar
            **/build/libs/*.jar
